<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Tab Timer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <span class="icon">⏱</span>
      <h1>Tab Timer</h1>
    </div>
    <div class="header-right">
      <span id="date-label" class="date-label"></span>
      <button id="reset-btn" class="reset-btn" title="今日のデータをリセット">↺</button>
    </div>
  </header>

  <div id="total-bar" class="total-bar">
    <span class="total-label">今日の合計</span>
    <span id="total-time" class="total-time">—</span>
  </div>

  <div id="list" class="domain-list"></div>

  <div id="empty" class="empty hidden">
    <p>まだデータがありません。</p>
    <p class="hint">タブを切り替えると計測が始まります。</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
