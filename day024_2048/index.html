<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>2048</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #faf8ef;
        font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100dvh;
        padding: 20px 10px;
        color: #776e65;
      }

      header {
        width: 100%;
        max-width: 460px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 56px;
        font-weight: 700;
        color: #776e65;
        line-height: 1;
      }

      .scores {
        display: flex;
        gap: 8px;
      }

      .score-box {
        background: #bbada0;
        border-radius: 6px;
        padding: 8px 16px;
        text-align: center;
        min-width: 80px;
      }

      .score-box .label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        color: #eee4da;
        letter-spacing: 1px;
      }

      .score-box .value {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        line-height: 1.2;
      }

      .controls {
        width: 100%;
        max-width: 460px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .subtitle {
        font-size: 14px;
        color: #776e65;
      }

      button {
        background: #8f7a66;
        color: #f9f6f2;
        border: none;
        border-radius: 6px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover { background: #7a6353; }

      #keep-playing {
        display: none;
        background: #f65e3b;
        margin-left: 8px;
      }
      #keep-playing:hover { background: #d94d2b; }

      .game-wrapper {
        position: relative;
        width: 100%;
        max-width: 460px;
      }

      canvas {
        display: block;
        width: 100%;
        touch-action: none;
        border-radius: 8px;
      }

      .message {
        display: none;
        position: absolute;
        inset: 0;
        border-radius: 8px;
        background: rgba(238, 228, 218, 0.73);
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        font-size: 48px;
        font-weight: 700;
        color: #776e65;
        z-index: 10;
      }

      .message.show { display: flex; }
      .message.won { background: rgba(237, 194, 46, 0.5); color: #fff; }
      .message.game-over { background: rgba(238, 228, 218, 0.73); }

      .hint {
        margin-top: 20px;
        font-size: 13px;
        color: #a09080;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>2048</h1>
      <div class="scores">
        <div class="score-box">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="label">Best</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
    </header>

    <div class="controls">
      <span class="subtitle">矢印キーまたはスワイプで操作</span>
      <div>
        <button id="new-game">New Game</button>
        <button id="keep-playing">Keep Playing</button>
      </div>
    </div>

    <div class="game-wrapper">
      <canvas id="game-canvas"></canvas>
      <div class="message" id="message"></div>
    </div>

    <p class="hint">同じ数字を合わせて 2048 を目指そう！</p>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
