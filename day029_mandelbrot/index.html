<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day029 — Mandelbrot Explorer</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Mandelbrot Explorer</h1>
        <div id="controls">
          <label>
            Iterations: <span id="iter-val">128</span>
            <input id="iter-slider" type="range" min="32" max="1024" step="32" value="128" />
          </label>
          <label>
            Colormap:
            <select id="cm-select"></select>
          </label>
          <button id="reset-btn">Reset</button>
        </div>
      </header>
      <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>
      <footer>
        <span id="info"></span>
        <span id="coord"></span>
        <span id="hints">scroll: zoom &nbsp;|&nbsp; drag: pan &nbsp;|&nbsp; click: zoom in &nbsp;|&nbsp; +/−: zoom &nbsp;|&nbsp; arrows: pan</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
