<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Resizer</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Image Resizer</h1>
        <p class="subtitle">PNG / JPEG 画像をリサイズしてダウンロード</p>
      </header>

      <main>
        <!-- Upload Zone -->
        <section id="upload-section">
          <div id="drop-zone" class="drop-zone">
            <div class="drop-zone-inner">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <p>画像をドロップ または</p>
              <label class="file-label" for="file-input">ファイルを選択</label>
              <input id="file-input" type="file" accept="image/png,image/jpeg,image/webp" />
              <p class="hint">PNG・JPEG・WebP 対応</p>
            </div>
          </div>
        </section>

        <!-- Controls -->
        <section id="controls-section" class="hidden">
          <div class="controls-grid">

            <!-- Original Info -->
            <div class="card" id="original-card">
              <h2>元画像</h2>
              <div class="preview-container">
                <img id="original-preview" alt="Original" />
              </div>
              <div class="image-info" id="original-info"></div>
            </div>

            <!-- Settings -->
            <div class="card" id="settings-card">
              <h2>リサイズ設定</h2>

              <div class="field-group">
                <label>プリセット</label>
                <div class="presets">
                  <button class="preset-btn" data-w="512" data-h="512">512×512<span>Slack</span></button>
                  <button class="preset-btn" data-w="256" data-h="256">256×256</button>
                  <button class="preset-btn" data-w="128" data-h="128">128×128<span>Discord</span></button>
                  <button class="preset-btn" data-w="64" data-h="64">64×64</button>
                  <button class="preset-btn" data-w="32" data-h="32">32×32<span>Favicon</span></button>
                  <button class="preset-btn" data-w="16" data-h="16">16×16</button>
                  <button class="preset-btn" data-w="400" data-h="400">400×400<span>X(Twitter)</span></button>
                  <button class="preset-btn" data-w="800" data-h="600">800×600</button>
                  <button class="preset-btn" data-w="1280" data-h="720">1280×720<span>HD</span></button>
                  <button class="preset-btn" data-w="1920" data-h="1080">1920×1080<span>FHD</span></button>
                </div>
              </div>

              <div class="field-group">
                <label>サイズ指定</label>
                <div class="size-inputs">
                  <div class="size-input-wrap">
                    <span>W</span>
                    <input type="number" id="width-input" min="1" max="8192" placeholder="Width" />
                    <span>px</span>
                  </div>
                  <button id="lock-btn" class="lock-btn active" title="アスペクト比を固定">
                    <svg id="lock-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                  </button>
                  <div class="size-input-wrap">
                    <span>H</span>
                    <input type="number" id="height-input" min="1" max="8192" placeholder="Height" />
                    <span>px</span>
                  </div>
                </div>
                <p class="field-note" id="lock-note">アスペクト比: 固定中</p>
              </div>

              <div class="field-group">
                <label>出力フォーマット</label>
                <div class="format-btns">
                  <button class="format-btn active" data-format="image/png">PNG</button>
                  <button class="format-btn" data-format="image/jpeg">JPEG</button>
                  <button class="format-btn" data-format="image/webp">WebP</button>
                </div>
              </div>

              <div class="field-group" id="quality-group" style="display:none">
                <label>品質: <span id="quality-label">90</span>%</label>
                <input type="range" id="quality-input" min="10" max="100" value="90" step="5" />
              </div>

              <button id="resize-btn" class="primary-btn">リサイズして表示</button>
            </div>

            <!-- Result -->
            <div class="card hidden" id="result-card">
              <h2>リサイズ後</h2>
              <div class="preview-container">
                <img id="result-preview" alt="Resized" />
              </div>
              <div class="image-info" id="result-info"></div>
              <button id="download-btn" class="primary-btn download-btn">ダウンロード</button>
            </div>

          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
