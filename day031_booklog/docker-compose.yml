services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-booklog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booklog}
      POSTGRES_DB: ${POSTGRES_DB:-booklog}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - booklog_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-booklog}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  booklog_data:
