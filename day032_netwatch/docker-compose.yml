services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netwatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netwatch}
      POSTGRES_DB: ${POSTGRES_DB:-netwatch}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - netwatch_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netwatch}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  netwatch_data:
